<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Pessoal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="bg-grid"></div>
        <div class="bg-noise"></div>
    </div>

    <div class="container">
        <!-- User Menu (só aparece quando logado) -->
        <div class="user-menu hidden" id="userMenu">
            <div class="user-trigger" id="userTrigger">
                <span id="userName">Olá, Usuário</span>
                <span class="chevron" id="chevron">></span>
            </div>
            <div class="user-dropdown hidden" id="userDropdown">
                <button class="dropdown-item" id="logoutBtn">
                    Sair
                </button>
            </div>
        </div>

        <!-- Login Card -->
        <div class="card" id="loginCard">
            <h2>Entrar</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••">
            </div>
            <div style="margin-top:24px;">
                <button onclick="login()">Entrar</button>
                <button onclick="showRegister()">Cadastrar-se</button>
            </div>
        </div>

        <!-- Register Card -->
        <div class="card hidden" id="registerCard">
            <h2>Criar conta</h2>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="registerNome" placeholder="Seu nome completo">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="registerSenha" placeholder="Mínimo 6 caracteres">
                <div class="senha-requisito" id="senhaRequisito">
                    <i>⚠️</i> A senha deve ter no mínimo 6 caracteres
                </div>
            </div>
            <div style="margin-top:24px;">
                <button onclick="register()">Cadastrar</button>
                <button onclick="showLogin()">Voltar</button>
            </div>
        </div>

        <!-- Livros Card -->
        <div class="card hidden" id="livrosCard">
            <h2>Minha Biblioteca</h2>
            <div class="form-group">
                <h3>Adicionar Livro</h3>
                <div class="flex">
                    <div style="flex: 2">
                        <input type="text" id="livroTitulo" placeholder="Título">
                    </div>
                    <div style="flex: 1">
                        <input type="text" id="livroAutor" placeholder="Autor">
                    </div>
                </div>
                <div class="flex">
                    <div style="flex: 1">
                        <input type="text" id="livroIsbn" placeholder="ISBN (13 dígitos)" maxlength="13">
                        <div class="livro-requisito" id="isbnRequisito">
                        </div>
                    </div>
                    <div style="flex: 1">
                        <input type="text" id="livroAno" placeholder="Ano (4 dígitos)" maxlength="4">
                        <div class="livro-requisito" id="anoRequisito">
                        </div>
                    </div>
                    <div style="flex: 1">
                        <input type="text" id="livroCategoria" placeholder="Categoria">
                    </div>
                </div>
                <div class="flex">
                    <textarea id="livroDescricao" placeholder="Descrição" rows="2" style="flex: 2"></textarea>
                    <select id="livroStatus" style="flex: 1">
                        <option value="Quero ler">Quero ler</option>
                        <option value="Lendo">Lendo</option>
                        <option value="Lido">Lido</option>
                        <option value="Não gostei">Não gostei</option>
                        <option value="Favorito">Favorito</option>
                        <option value="Emprestado">Emprestado</option>
                    </select>
                </div>
                <div style="margin-top:14px;">
                    <button onclick="criarLivro()">Adicionar Livro</button>
                </div>
            </div>
            <div class="divider"></div>
            <div id="lista-livros"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
